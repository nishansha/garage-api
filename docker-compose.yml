x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    container_name: garage-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garage}
      POSTGRES_USER: ${POSTGRES_USER:-garage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garage} -d ${POSTGRES_DB:-garage}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Bind to localhost only — exposed for ad-hoc psql from the host, not the internet.
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garage-app
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-garage}
      SPRING_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-garage}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-garage}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET in .env}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:8081}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    # Bind to localhost only — nginx reaches the app over the internal Docker
    # network (app:8080); the port is published just for ad-hoc host access.
    ports:
      - "127.0.0.1:8080:8080"

  web:
    image: nginx:alpine
    container_name: garage-web
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - app
    volumes:
      - ./web/dist:/usr/share/nginx/html:ro
      - ./web/vite/dist:/usr/share/nginx/vite:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

volumes:
  pgdata:
    name: garage_pgdata
